# End-to-end package install smoke test.
#
# At RC.0 the SDK published a main-entry re-export from an optional peer
# dependency. A real user's `npm install @strands-agents/sdk` succeeded, then
# crashed at module load because the optional peer was not installed.
#
# The existing `test:package` doesn't catch this: it resolves the SDK via
# `file:../../..` and the monorepo's root `node_modules` hoists every optional
# peer (they're devDependencies of the repo), silently satisfying the bad
# re-export. This workflow reproduces a real user's install: `npm pack` the
# SDK, install the tarball in a tempdir OUTSIDE the monorepo tree so nothing
# hoists, then type-check and run a consumer script that touches the public
# surface. A missing optional peer fails at module load the same way it would
# for an end user.
name: "TypeScript: Test Package Pack"

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      version:
        description: 'If set, run `npm version <value> --no-git-tag-version` before pack. Required for release-time builds — without it the packed tarball uses whatever version is committed in package.json (typically 0.0.0). PR-time callers leave this empty.'
        required: false
        type: string
        default: ''

jobs:
  test-package-pack:
    name: Pack Install
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Stamp version (if provided)
        # Stamps the typed release version into strands-ts/package.json so
        # the subsequent build + pack produce a tarball at that exact
        # version. Skipped on PR-time runs (no version input) — the test
        # only validates the install/import surface there, not the version.
        working-directory: strands-ts
        env:
          PINNED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "$PINNED_VERSION" ]; then
            echo "Stamping $PINNED_VERSION into package.json"
            npm version "$PINNED_VERSION" --no-git-tag-version
          else
            echo "No version pinned; packing with package.json as-committed."
          fi

      - name: Build
        run: npm run build

      - name: Pack, install in tmpdir, type-check, and run
        # The tempdir MUST live outside the monorepo — otherwise npm hoists
        # devDependencies from the repo root into resolution and silently
        # satisfies missing optional peers, defeating the test.
        env:
          PINNED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          TARBALL=$(cd strands-ts && npm pack --silent)
          TARBALL_PATH="$GITHUB_WORKSPACE/strands-ts/$TARBALL"
          echo "Packed: $TARBALL_PATH"

          # When a version is pinned, assert the packed tarball carries it.
          # Catches a stamp-step failure that silently shipped 0.0.0 (or any
          # stale package.json version).
          if [ -n "$PINNED_VERSION" ]; then
            actual=$(tar -xOzf "$TARBALL_PATH" package/package.json | jq -r .version)
            if [ "$actual" != "$PINNED_VERSION" ]; then
              echo "::error::Packed tarball has version '$actual' but expected '$PINNED_VERSION'."
              exit 1
            fi
            echo "Tarball version OK: $actual"
          fi

          WORK=$(mktemp -d)
          trap 'rm -rf "$WORK"' EXIT
          echo "Workspace: $WORK"
          cp strands-ts/test/packages/npm-pack/package.json \
             strands-ts/test/packages/npm-pack/tsconfig.json \
             strands-ts/test/packages/npm-pack/verify.ts \
             "$WORK/"
          cd "$WORK"

          npm install --ignore-scripts --no-audit --no-fund
          npm install --ignore-scripts --no-audit --no-fund "$TARBALL_PATH"

          npx tsc --noEmit
          npx tsx verify.ts

      # Upload the packed tarball so release.yml's inspect/publish jobs can
      # consume the EXACT bytes this smoke test validated. PR-triggered runs
      # also upload (short retention) — harmless.
      - name: Upload tarball for downstream inspect/publish
        uses: actions/upload-artifact@v7
        with:
          name: npm-build-output
          path: strands-ts/*.tgz
          if-no-files-found: error
          retention-days: 7
