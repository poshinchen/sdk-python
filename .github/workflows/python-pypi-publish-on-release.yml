name: "Python: Publish Package (manual fallback)"

# ⚠️ Manual fallback — prefer release.yml.
#
# release.yml is the primary release path: it pins a SHA, builds + inspects
# the wheel, drafts notes, requires 2 reviewer approvals, publishes to PyPI,
# then creates the GitHub release. This workflow does NOT replicate that gate
# — it just rebuilds from a tag and uploads.
#
# Use this only when release.yml is broken (or already half-ran) and a
# maintainer needs to hand-publish a tag that's already been pushed. Because
# it's `workflow_dispatch`-only, it requires repo write access to invoke; it
# is intentionally NOT triggered by `release: published` (that path is owned
# by release.yml and the dual-firing would break the artifact-identity
# guarantee).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish, e.g. python/v1.4.0 (must already exist)'
        required: true
        type: string

jobs:
  call-test-lint:
    if: startsWith(inputs.tag, 'python/v1.')
    uses: ./.github/workflows/python-test-lint.yml
    permissions:
      contents: read
    with:
      ref: ${{ inputs.tag }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build distribution
    if: startsWith(inputs.tag, 'python/v1.')
    permissions:
      contents: read
    needs:
      - call-test-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: strands-py

    steps:
    - uses: actions/checkout@v7
      with:
        ref: ${{ inputs.tag }}
        persist-credentials: false
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install hatch twine

    - name: Validate version
      run: |
        version=$(hatch version)
        if [[ $version =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Valid version format"
            exit 0
        else
            echo "Invalid version format"
            exit 1
        fi

    - name: Build
      run: |
        hatch build

    - name: Store the distribution packages
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions
        path: strands-py/dist/

  deploy:
    name: Upload release to PyPI
    needs:
    - build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/strands-agents
    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
